        }

        line-height: 1.15;
        }

        line-height: 1.4;
        margin-bottom: 16px;
        overflow-wrap: anywhere;
        word-break: break-word;
        }
        #panel .meta .source {

        }

        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 6px;
        padding: 4px 28px 4px 8px;
        font: inherit;
        }
        #groupControls {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 12px 22px;
        }
        #groupControls label {
        display: flex;
        align-items: flex-start;
        gap: 9px;
        margin: 0;
        cursor: pointer;
        user-select: none;
        min-width: 0;
        }
        #groupControls input[type="checkbox"] {
        width: 15px;
        height: 15px;
        margin: 0;
        accent-color: #3b82f6;
        flex: 0 0 auto;
        }
        .legend-line {
        width: 24px;
        height: 3px;
        border-radius: 999px;
        flex: 0 0 auto;
        box-shadow: 0 0 8px currentColor;
        }
        .legend-text {
        font-size: 14px;
        color: #e5e7eb;
        min-width: 0;
        overflow-wrap: anywhere;
        }
        #groupControls .count {
        color: #94a3b8;
        font-size: 11px;
        margin-left: 2px;
        }
        .panel-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 18px;
        font-size: 16px;
        color: #e5e7eb;
        }

        color: #94a3b8;
        font-size: 12px;
        margin-top: 14px;
        }
        #speedLegend {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid rgba(148, 163, 184, 0.20);
        }
        #speedLegend[hidden] {
        display: none;
        }
        #speedLegend .legend-title {
        font-size: 13px;
        color: #cbd5e1;
        margin-bottom: 8px;
        }
        #speedLegend .legend-note {
        margin-top: 8px;
        color: #94a3b8;
        font-size: 12px;
        line-height: 1.35;
        }
        .speed-scale {
        height: 12px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.30);
        background: linear-gradient(
        90deg,
        #111827 0%,
        #2b2f77 10%,
        #2745cc 22%,
        #1287e3 38%,
        #10cbe6 52%,
        #19d87f 67%,
        #8be34a 82%,
        #facc15 100%
        );
        box-shadow: inset 0 0 8px rgba(15, 23, 42, 0.32);
        }

        position: relative;
        height: 16px;
        margin-top: 6px;
        font-size: 11px;
        color: #94a3b8;
        }

        top: 0;

        }

        display: none;
        z-index: 20;
        pointer-events: none;
        max-width: 460px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(2, 6, 23, 0.92);
        border: 1px solid #475569;
        color: #e5e7eb;
        font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre-wrap;

        function pos(node) {
        return new THREE.Vector3(node.x, node.y, node.z);
        }

        function edgeLaneOffset(edge) {
        if (edge.group === 'spine-exit') return -7;
        if (edge.group === 'exit-spine') return 7;
        return 0;
        }

        function edgePoints(a, b, edge) {
        const start = pos(a);
        const end = pos(b);
        const offset = edgeLaneOffset(edge);
        if (!offset) return [start, end];

        const dir = new THREE.Vector3().subVectors(end, start);
        const lane = new THREE.Vector3().crossVectors(
        dir,
        new THREE.Vector3(0, 1, 0),
        );
        if (lane.lengthSq() < 0.0001) lane.set(1, 0, 0);
        lane.normalize().multiplyScalar(offset);

        return [start.add(lane), end.add(lane)];
        }

        canvas.width = Math.max(96, width);
        canvas.height = 42;
        ctx.font = '24px system-ui, sans-serif';
        ctx.fillStyle = 'rgba(15, 23, 42, 0.78)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e5e7eb';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        const texture = new THREE.CanvasTexture(canvas);
        const material = new THREE.SpriteMaterial({
        map: texture,

        const sprite = new THREE.Sprite(material);
        sprite.scale.set(canvas.width * 0.45, canvas.height * 0.45, 1);
        return sprite;

        function layerGuide(layer) {
        const layerNodes = DATA.nodes.filter(n => n.layer === layer.id);
        if (!layerNodes.length) return;
        const radius = Math.max(...layerNodes.map(n => Math.hypot(n.x, n.z)));
        const points = [];
        for (let i = 0; i <= 96; i++) {
        const a = i * Math.PI * 2 / 96;
        points.push(new THREE.Vector3(
          Math.cos(a) * radius,
          layer.y,
          Math.sin(a) * radius,
        ));
        }
        const geom = new THREE.BufferGeometry().setFromPoints(points);
        const mat = new THREE.LineBasicMaterial({
        color: 0x334155,
        transparent: true,
        opacity: 0.6,
        });
        scene.add(new THREE.Line(geom, mat));
        }

        for (const layer of DATA.layers) layerGuide(layer);

        function edgeOrderedEnds(edge) {
        const a = nodeById.get(edge.a);
        const b = nodeById.get(edge.b);
        if (!a || !b) return null;

        function withOrder(source, target) {
        return {
          source,
          target,
          metric: source.id === edge.a ? edge.a_to_b : edge.b_to_a,
        };
        }

        if (edge.group === 'leaf-spine') {
        return a.layer === 'leaf' ? withOrder(a, b) : withOrder(b, a);
        }
        if (edge.group === 'exit-spine') {
        return a.layer === 'reverse-exit' ? withOrder(a, b) : withOrder(b, a);
        }
        if (edge.group === 'spine-exit') {
        return a.layer === 'spine' ? withOrder(a, b) : withOrder(b, a);
        }
        if (edge.group === 'leaf-exit') {
        return a.layer === 'leaf' ? withOrder(a, b) : withOrder(b, a);
        }
        return withOrder(a, b);
        }

        function directedEdge(edge, mode) {
        const ordered = edgeOrderedEnds(edge);
        if (!ordered) return null;
        if (mode === 'to') {
        return {
          source: ordered.target,
          target: ordered.source,
          metric: ordered.target.id === edge.a ? edge.a_to_b : edge.b_to_a,
        };
        }
        return ordered;
        }

        function metricValue(edge, mode) {
        if (mode === 'topology' || DATA.topology_only) return null;
        const directed = directedEdge(edge, mode);
        if (!directed || !directed.metric) return 0;
        return directed.metric.status === 'up' ? directed.metric.mbps : 0;
        }

        function speedColor(mbps) {
        const lo = Math.log10(5);
        const hi = Math.log10(500);
        const value = Math.log10(Math.max(5, mbps));
        const t = Math.max(0, Math.min(1, (value - lo) / (hi - lo)));
        const idx = Math.round(t * (speedColorMap.length - 1));
        return new THREE.Color(speedColorMap[idx]);
        }

        function colorFor(edge, mode) {
        const mbps = metricValue(edge, mode);
        if (mbps === null) return linkColor[edge.group] || 0x94a3b8;
        if (mbps <= 0) return 0x111827;
        return speedColor(mbps);
        }

        function metricText(m) {
        if (!m) return 'missing';
        return `${m.mbps.toFixed(1)} Mbit/s ${m.status} ` +
        `via ${m.iface} ${m.peer_ip}`;
        }

        function edgeTooltip(edge, mode) {
        const a = nodeById.get(edge.a);
        const b = nodeById.get(edge.b);
        if (mode === 'from' || mode === 'to') {
        const directed = directedEdge(edge, mode);
        if (!directed) return `${edge.group} (${edge.link_type})`;
        return `${edge.group} (${edge.link_type})
        ` +
          `${directed.source.name} -> ${directed.target.name}: ` +
          `${metricText(directed.metric)}
        ` +
          `${a.name} -> ${b.name}: ${metricText(edge.a_to_b)}
        ` +
          `${b.name} -> ${a.name}: ${metricText(edge.b_to_a)}`;
        }
        return `${edge.group} (${edge.link_type})
        ` +
        `${a.name} -> ${b.name}: ${metricText(edge.a_to_b)}
        ` +
        `${b.name} -> ${a.name}: ${metricText(edge.b_to_a)}`;
        }

        function updateArrow(line, mode) {
        const arrow = line.userData.arrow;
        if (!arrow) return;
        if (mode !== 'from' && mode !== 'to') {
        arrow.visible = false;
        return;
        }
        const directed = directedEdge(line.userData.edge, mode);
        const a = nodeById.get(line.userData.edge.a);
        const b = nodeById.get(line.userData.edge.b);
        if (!directed || !a || !b) {
        arrow.visible = false;
        return;
        }
        const points = edgePoints(a, b, line.userData.edge);
        let start = points[0].clone();
        let end = points[1].clone();
        if (directed.source.id !== line.userData.edge.a) {
        const swap = start;
        start = end;
        end = swap;
        }
        const dir = new THREE.Vector3().subVectors(end, start);
        if (dir.lengthSq() < 0.000001) {
        arrow.visible = false;
        return;
        }
        dir.normalize();
        arrow.position.copy(end).addScaledVector(dir, -22);
        arrow.quaternion.setFromUnitVectors(
        new THREE.Vector3(0, 1, 0),
        dir,
        );
        arrow.material.color.set(line.material.color);
        arrow.visible = line.visible;
        }

        for (const edge of DATA.edges) {
        const a = nodeById.get(edge.a);
        const b = nodeById.get(edge.b);
        if (!a || !b) continue;
        const geom = new THREE.BufferGeometry().setFromPoints(
        edgePoints(a, b, edge),
        );
        const mat = new THREE.LineBasicMaterial({
        color: colorFor(edge, 'best'),
        linewidth: 2,
        });
        const line = new THREE.Line(geom, mat);
        const arrow = new THREE.Mesh(
        new THREE.ConeGeometry(6, 18, 12),
        new THREE.MeshStandardMaterial({
          color: colorFor(edge, 'best'),
        }),
        );
        arrow.visible = false;
        line.userData = { type: 'edge', edge, arrow };
        scene.add(line);
        scene.add(arrow);
        edgeObjects.push(line);
        objects.push(line);
        }

          '<span style="left:60%;transform:translateX(-50%)">spine-exit</span>',
          '<span style="left:80%;transform:translateX(-50%)">leaf-exit</span>',
          '<span style="right:0">exit-exit</span>',
        ].join('');
        return;
        }
        speedLegendTitle.textContent = `speed colors: ${mode}`;
        speedLegendNote.textContent = [
        `Arrows and colors show ${mode} direction.`,
        'Magma log scale from 5 to 500 Mbit/s.',
        'Dark links mean down or missing metrics.',
        ].join(' ');
        scale.style.background = [
        'linear-gradient(90deg',
        '#000004 0%',
        '#2c115f 18%',
        '#721f81 35%',
        '#b73779 52%',
        '#f1605d 68%',
        '#feb078 84%',
        '#fcfdbf 100%)',
        ].join(', ');
        labels.innerHTML = [
        '<span style="left:0;transform:none">5</span>',
        '<span style="left:30%;transform:translateX(-50%)">20</span>',
        '<span style="left:65%;transform:translateX(-50%)">100</span>',
        '<span style="right:0">500 Mbit/s</span>',
        ].join('');
        }

        function refreshEdges() {
        const active = activeGroups();
        const mode = document.getElementById('colorMode').value;
        for (const line of edgeObjects) {
        const edge = line.userData.edge;
        line.visible = active.has(edge.group);
        line.material.color.set(colorFor(edge, mode));
        updateArrow(line, mode);
        }
        refreshSpeedLegend(mode);
        }

        document.querySelectorAll('input[data-group]').forEach(input => {
        input.addEventListener('change', refreshEdges);
        });
        document.getElementById('colorMode').addEventListener('change', refreshEdges);

        addEventListener('mousemove', event => {
        mouse.x = event.clientX / innerWidth * 2 - 1;
        mouse.y = -(event.clientY / innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(objects.filter(o => o.visible));
        if (!hits.length) {
        tooltip.style.display = 'none';
        return;
        }
        const obj = hits[0].object;
        if (obj.userData.type === 'node') {
        const n = obj.userData.node;
        tooltip.textContent = `${n.kind}:${n.name}\nlayer: ${n.layer}`;
        } else {
        tooltip.textContent = edgeTooltip(
          obj.userData.edge,
          document.getElementById('colorMode').value,
        );
        }
        tooltip.style.left = `${event.clientX + 14}px`;
        tooltip.style.top = `${event.clientY + 14}px`;
        tooltip.style.display = 'block';
        });

        addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
        });

        function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
        }
        refreshEdges();
        animate();
        </script>
    </body>
</html>
